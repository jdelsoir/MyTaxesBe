<title>Waar gaat mijn belastinggeld naartoe? — België</title>
<style>/* ============ tokens ============ */
:root {
  --be-black: #1a1a1a; --be-black-true: #000; --be-gold: #fdd116; --be-gold-deep: #c79100;
  --be-red: #ef3340; --be-red-deep: #c8102e;
  --ground: #ffffff; --paper: #f6f5f1; --panel: #fbfaf7; --ink: #1a1a1a; --muted: #5d5d5d;
  --line: #e6e4dd; --focus: #2a6cf0;
  --radius: 16px; --shadow: 0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.05);
  --maxw: 980px; --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body { margin: 0; font-family: var(--font); color: var(--ink); background: var(--paper); line-height: 1.55; font-size: 17px; -webkit-font-smoothing: antialiased; padding-bottom: 72px; }
h1, h2, h3 { line-height: 1.12; letter-spacing: -0.02em; margin: 0; }
button, input, output { font: inherit; }
button { cursor: pointer; }
a { color: var(--be-red-deep); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
.skip-link { position: absolute; left: -999px; top: 0; background: var(--ink); color: #fff; padding: 10px 16px; z-index: 60; border-radius: 0 0 8px 0; }
.skip-link:focus { left: 0; }
:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 5px; }

/* ============ app bar ============ */
.appbar { position: sticky; top: 0; z-index: 40; background: var(--ground); border-bottom: 1px solid var(--line); }
.appbar-inner { max-width: var(--maxw); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 16px; }
.brand { display: flex; align-items: center; gap: 10px; background: none; border: none; padding: 0; min-width: 0; color: inherit; }
.flag { width: 26px; height: 19px; flex: 0 0 auto; border-radius: 3px; background: linear-gradient(90deg, var(--be-black-true) 0 33.33%, var(--be-gold) 33.33% 66.66%, var(--be-red) 66.66% 100%); box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
.brand-title { font-weight: 800; font-size: .92rem; letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.appbar-tools { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; flex-wrap: wrap; justify-content: flex-end; min-width: 0; }
.yearseg { display: inline-flex; border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden; }
.yearseg button { border: none; background: #fff; color: var(--muted); padding: 6px 9px; font-weight: 700; font-size: .8rem; border-right: 1px solid var(--line); position: relative; }
.yearseg button:last-child { border-right: none; }
.yearseg button[aria-pressed="true"] { background: var(--ink); color: #fff; }
.seg-badge { color: #a87a00; font-weight: 900; }
.yearseg button[aria-pressed="true"] .seg-badge { color: var(--be-gold); }
.lang { display: flex; gap: 4px; }
.lang button { border: 1.5px solid var(--line); background: #fff; color: var(--muted); padding: 6px 8px; border-radius: 8px; font-weight: 700; font-size: .78rem; }
.lang button[aria-pressed="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }
.tricolor { display: flex; height: 4px; }
.tricolor i { flex: 1; }
.tricolor i:nth-child(1){ background: var(--be-black-true); }
.tricolor i:nth-child(2){ background: var(--be-gold); }
.tricolor i:nth-child(3){ background: var(--be-red); }

/* ============ tab bar (bottom on mobile) ============ */
.tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 45; display: flex; justify-content: space-around; background: var(--ground); border-top: 1px solid var(--line); padding: 6px max(8px, env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)); }
.tabbar a { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 3px; min-height: 52px; justify-content: center; text-decoration: none; color: var(--muted); font-size: .66rem; font-weight: 700; border-radius: 10px; }
.tabbar a .ic { width: 22px; height: 22px; }
.tabbar a span { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tabbar a[aria-current="page"] { color: var(--be-red-deep); background: #fdecec; }

/* ============ screens ============ */
#view { max-width: var(--maxw); margin: 0 auto; padding: 18px 16px 28px; outline: none; }
.screen { display: flex; flex-direction: column; gap: 18px; }
.screen-head h1 { font-size: clamp(1.7rem, 4.5vw, 2.4rem); }
.sub { color: var(--muted); margin: 6px 0 0; font-size: .96rem; }
.kicker { text-transform: uppercase; letter-spacing: .16em; font-size: .72rem; font-weight: 800; color: var(--be-red-deep); margin: 0; }
.badge { background: var(--be-gold); color: #3a2a00; padding: 1px 7px; border-radius: 999px; font-size: .68rem; letter-spacing: .04em; }
.provbanner { background: #fff7e6; border: 1px solid #f0d488; color: #6b4e00; padding: 11px 14px; border-radius: 12px; font-size: .9rem; margin: 0; }

/* ============ home ============ */
.home { text-align: center; align-items: center; padding-top: 14px; gap: 14px; }
.home-q { font-size: clamp(1.9rem, 6vw, 3.2rem); max-width: 16ch; }
.home-big { font-size: clamp(3rem, 13vw, 6rem); font-weight: 900; letter-spacing: -0.04em; line-height: .95; color: var(--be-red-deep); margin: 4px 0 0; }
.home-perday { font-weight: 700; color: var(--ink); margin: 0; font-size: 1.05rem; }
.home-lead { color: var(--muted); max-width: 46ch; margin: 2px auto 0; }
.hook { width: 100%; max-width: 460px; background: var(--ground); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-top: 4px; }
.hook label { display: block; font-weight: 700; margin-bottom: 8px; text-align: left; }
.hook-row { display: flex; gap: 8px; }
.hook-row input { flex: 1; min-width: 0; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 11px; font-weight: 700; }
.btn-primary { display: inline-flex; align-items: center; gap: 7px; background: var(--be-red-deep); color: #fff; border: none; border-radius: 11px; padding: 12px 16px; font-weight: 800; white-space: nowrap; }
.btn-primary .ic { width: 18px; height: 18px; }
.btn-primary:hover { background: #a50d25; }
.entry { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; width: 100%; max-width: 760px; }
.entry-card { display: flex; align-items: center; gap: 12px; text-align: left; text-decoration: none; color: var(--ink); background: var(--ground); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); transition: transform .12s ease; }
.entry-card:hover { transform: translateY(-2px); }
.entry-ic { width: 30px; height: 30px; flex: 0 0 auto; color: var(--be-red-deep); }
.entry-ic .ic { width: 100%; height: 100%; }
.entry-card b { display: block; }
.entry-card small { color: var(--muted); font-size: .82rem; }

/* ============ cards ============ */
.card { background: var(--ground); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.card h2 { font-size: 1.25rem; }
.card-head { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; justify-content: space-between; }
.h-row { display: flex; align-items: center; gap: 10px; }
.h-ic { width: 1.3em; height: 1.3em; color: var(--be-red-deep); flex: 0 0 auto; }
.h-ic .ic { width: 100%; height: 100%; }

/* ============ stats ============ */
.stat { background: var(--panel); border: 1px solid var(--line); border-radius: 13px; padding: 14px 16px; border-top: 4px solid var(--be-gold); }
.stat-num { display: block; font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -0.03em; }
.stat-lbl { display: block; color: var(--muted); font-size: .82rem; margin-top: 4px; }
.you-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.you-stat { background: var(--ground); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; border-top: 4px solid var(--be-red); }
.you-stat.is-day { border-top-color: #1d3461; }
.you-stat-num { display: block; font-size: clamp(1.5rem, 6vw, 2rem); font-weight: 800; letter-spacing: -0.03em; color: var(--ink); line-height: 1.1; }
.you-stat-lbl { display: block; margin-top: 6px; color: var(--muted); font-size: .9rem; }

/* ============ treemap ============ */
.breadcrumb { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 12px 0; font-size: .9rem; }
.breadcrumb button, .breadcrumb a { background: none; border: none; color: var(--be-red-deep); font-weight: 700; padding: 2px 4px; text-decoration: underline; }
.breadcrumb .sep { color: var(--muted); }
.breadcrumb .cur { font-weight: 700; color: var(--ink); }
.treemap { position: relative; width: 100%; aspect-ratio: 16/10; min-height: 320px; border-radius: 12px; overflow: hidden; background: var(--paper); }
.tm-cell { position: absolute; overflow: hidden; border: 2px solid #fff; border-radius: 7px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; color: #fff; text-align: left; transition: filter .12s ease; cursor: pointer; }
.tm-cell.is-leaf { cursor: default; }
.tm-cell:hover { filter: brightness(1.08); z-index: 2; }
.tm-cell:focus-visible { outline: none; box-shadow: inset 0 0 0 3px var(--ink), inset 0 0 0 6px #fff; z-index: 4; }
.tm-cell .tm-name { font-weight: 700; font-size: .82rem; line-height: 1.05; text-shadow: 0 1px 2px rgba(0,0,0,.35); }
.tm-cell .tm-val { font-size: .74rem; opacity: .95; text-shadow: 0 1px 2px rgba(0,0,0,.35); }
.tm-cell.ink-dark { color: var(--be-black); }
.tm-cell.ink-dark .tm-name, .tm-cell.ink-dark .tm-val { text-shadow: none; }
.tm-ic { position: absolute; top: 8px; left: 10px; width: 22px; height: 22px; opacity: .9; }
.tm-ic .ic { width: 22px; height: 22px; }
.data-fallback summary { cursor: pointer; color: var(--be-red-deep); font-weight: 700; font-size: .9rem; padding: 4px 0; }

/* ============ category grid ============ */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.cat-card { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); background: var(--ground); border: 1px solid var(--line); border-radius: 14px; padding: 14px; box-shadow: var(--shadow); transition: transform .12s ease; }
.cat-card:hover { transform: translateY(-2px); }
.cat-meta { flex: 1; min-width: 0; }
.cat-meta b { display: block; font-size: .98rem; }
.cat-meta small { color: var(--muted); font-size: .82rem; }
.cat-day { text-align: right; font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
.cat-day small { display: block; color: var(--muted); font-weight: 600; font-size: .72rem; }

/* data sources */
.src-list { display: flex; flex-direction: column; gap: 10px; }
.src-card { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--ink); background: var(--ground); border: 1px solid var(--line); border-radius: 12px; padding: 14px; box-shadow: var(--shadow); transition: transform .12s ease; }
.src-card:hover { transform: translateY(-1px); }
.src-meta { flex: 1; min-width: 0; }
.src-meta b { display: block; font-size: .98rem; }
.src-meta small { color: var(--muted); font-size: .85rem; }
.src-lic { flex: 0 0 auto; font-size: .72rem; font-weight: 800; color: var(--be-red-deep); border: 1.5px solid var(--line); border-radius: 999px; padding: 3px 9px; white-space: nowrap; }

/* ============ category detail ============ */
.cat-detail { gap: 14px; }
.cat-hero { background: var(--ground); border: 1px solid var(--line); border-left: 6px solid var(--cat); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.cat-hero-ic { width: 48px; height: 48px; margin-bottom: 10px; }
.cat-hero h1 { font-size: clamp(1.6rem, 4.5vw, 2.3rem); }
.cat-blurb { color: var(--ink); margin: 10px 0 0; font-size: 1.05rem; max-width: 60ch; }
.cat-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.covers, .dept-list { margin: 12px 0 0; padding: 0; list-style: none; }
.covers li { position: relative; padding-left: 22px; margin: 7px 0; }
.covers li::before { content: ""; position: absolute; left: 4px; top: .55em; width: 7px; height: 7px; border-radius: 2px; background: var(--be-red); }
.covers-none li { color: var(--muted); font-style: italic; }
.covers-none li::before { background: var(--muted); }
.cat-note { margin: 12px 0 0; padding: 10px 12px; background: var(--panel); border-radius: 10px; color: var(--muted); font-size: .9rem; }
.dept-list li { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.dept-list li:last-child { border-bottom: none; }
.dept-list b { font-variant-numeric: tabular-nums; white-space: nowrap; }
.your-card { border-left: 6px solid var(--be-gold); }
.your-amt { font-size: 1.3rem; margin: 10px 0 0; }
.your-amt b { color: var(--be-red-deep); }
.cat-nav { display: flex; gap: 10px; }
.btn { flex: 1; min-width: 0; text-align: center; text-decoration: none; background: var(--ground); border: 1.5px solid var(--line); border-radius: 12px; padding: 12px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn:hover { border-color: var(--ink); }

/* ============ you / daily bread ============ */
.db-label { display: block; font-weight: 700; margin-bottom: 8px; }
.db-input { display: flex; align-items: center; gap: 16px; }
.db-input input[type=range] { flex: 1; accent-color: var(--be-red); height: 28px; }
#income-out { font-weight: 800; font-size: 1.2rem; min-width: 5.5ch; text-align: right; }
.db-tax { font-size: 1.05rem; margin: 14px 0 0; }
.db-tax strong { color: var(--be-red-deep); }
.db-disclaimer { color: var(--muted); font-size: .82rem; margin: 6px 0 14px; }
.db-tax small { display: block; color: var(--muted); font-weight: 500; font-size: .85rem; margin-top: 3px; }
.extras { display: flex; flex-direction: column; gap: 14px; margin: 14px 0; }
.extra-item { display: flex; flex-direction: column; }
.extra-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px; }
.extra-head { display: flex; align-items: center; gap: 4px; flex: 1 1 170px; min-width: 0; }
.extra-ctrl { display: flex; align-items: center; gap: 10px; flex: 2 1 240px; min-width: 0; }
.info-btn { background: none; border: none; color: var(--be-red-deep); width: 26px; height: 26px; padding: 3px; border-radius: 50%; flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center; }
.info-btn .ic { width: 18px; height: 18px; }
.info-btn:hover { background: #fdecec; }
.extra-info { margin: 4px 0 0; font-size: .85rem; color: var(--muted); background: var(--panel); padding: 9px 11px; border-radius: 8px; }
.extra-tog { display: flex; align-items: center; gap: 8px; font-weight: 600; min-width: 0; }
.extra-tog input { width: 18px; height: 18px; accent-color: var(--be-red); flex: 0 0 auto; }
.qty-in { display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
.qty-in input { width: 5em; padding: 8px 10px; border: 1.5px solid var(--line); border-radius: 9px; font-weight: 700; font-variant-numeric: tabular-nums; }
.qty-in input:disabled { opacity: .5; }
.qty-in .unit { color: var(--muted); font-size: .85rem; white-space: nowrap; }
.extra-out { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; text-align: right; }
@media (max-width: 560px) { .info-btn { width: 40px; height: 40px; } }
.commune-in { width: 100%; max-width: 360px; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-weight: 600; margin-bottom: 14px; }
.lvlbar { display: flex; height: 22px; border-radius: 7px; overflow: hidden; background: var(--line); }
.lvlbar span { display: block; min-width: 2px; }
.lvl-legend { list-style: none; padding: 0; margin: 12px 0; display: flex; flex-direction: column; gap: 8px; }
.lvl-legend li { display: flex; align-items: center; gap: 10px; font-size: .95rem; }
.lvl-legend .sw { width: 14px; height: 14px; border-radius: 3px; flex: 0 0 auto; }
.lvl-legend b { margin-left: auto; font-variant-numeric: tabular-nums; }
.lvl-legend small { color: var(--muted); min-width: 3.6ch; text-align: right; }
.db-breakdown { display: grid; gap: 8px; }
.db-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: center; font-size: .95rem; text-decoration: none; color: var(--ink); padding: 4px; border-radius: 10px; }
.db-row:hover { background: var(--panel); }
.db-bar { display: block; width: 100%; height: 8px; border-radius: 4px; background: var(--line); position: relative; overflow: hidden; margin-top: 4px; }
.db-bar > i { position: absolute; inset: 0 auto 0 0; border-radius: 4px; }
.db-name { display: flex; flex-direction: column; min-width: 0; }
.db-name b { font-weight: 600; }
.db-val { font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 700; }
.db-val small { color: var(--muted); font-weight: 500; }

/* ============ table ============ */
.downloads { display: flex; gap: 8px; margin: 12px 0; }
.downloads button { border: 1.5px solid var(--ink); background: #fff; color: var(--ink); padding: 9px 12px; border-radius: 9px; font-weight: 700; font-size: .82rem; }
.downloads button:hover { background: var(--ink); color: #fff; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .95rem; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); }
th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
thead th { background: var(--panel); }
thead th button { background: none; border: none; font-weight: 800; color: var(--ink); padding: 0; }
thead th[aria-sort="ascending"] button::after { content: " ▲"; }
thead th[aria-sort="descending"] button::after { content: " ▼"; }
.td-lbl { display: inline-flex; align-items: center; text-decoration: none; color: var(--ink); }
tbody tr:hover { background: #faf9f6; }

/* ============ compare ============ */
.cmp-pick { display: flex; flex-direction: column; gap: 12px; }
.cmp-pick-row { display: flex; align-items: center; gap: 12px; }
.cmp-pick-row > span { font-weight: 700; min-width: 3em; }
.cmp-total { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 6px 14px; }
.cmp-total b { font-size: 1.1rem; font-variant-numeric: tabular-nums; }
.cmp-list { display: flex; flex-direction: column; gap: 8px; }
.cmp-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: center; text-decoration: none; color: var(--ink); background: var(--ground); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; box-shadow: var(--shadow); transition: transform .12s ease; }
.cmp-row:hover { transform: translateY(-1px); }
.cmp-name { display: flex; flex-direction: column; min-width: 0; }
.cmp-name b { font-size: .95rem; }
.cmp-name small { color: var(--muted); font-variant-numeric: tabular-nums; }
.cmp-delta { font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; text-align: right; }
.cmp-delta small { display: block; font-weight: 600; opacity: .85; }
.cmp-delta.up { color: #1d3461; }
.cmp-delta.down { color: #0b6b4a; }
.cmp-delta.flat { color: var(--muted); }
.dept-list b small { color: var(--muted); font-weight: 600; margin-left: 6px; }

/* ============ icons / chips ============ */
.ic { width: 1em; height: 1em; display: block; }
.chip { display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; color: #fff; flex: 0 0 auto; }
.chip.ink-dark { color: var(--be-black); }
.db-ic { width: 28px; height: 28px; font-size: 16px; }
.cell-ic { width: 24px; height: 24px; font-size: 15px; margin-right: 9px; }
.card-ic { width: 40px; height: 40px; font-size: 22px; }
.cat-hero-ic.chip { font-size: 26px; }

/* ============ about ============ */
.about-src { color: var(--muted); font-size: .88rem; }
.foot-meta { margin-top: 6px; opacity: .85; }
.about-note { border-left: 4px solid var(--be-gold); }
.about-note p { margin: 0 0 10px; }
.about-note p:last-child { margin-bottom: 0; }
.about-thanks { font-style: italic; color: var(--muted); font-size: .95rem; }

/* ============ view transitions ============ */
::view-transition-old(root), ::view-transition-new(root) { animation-duration: .22s; }

/* ============ responsive ============ */
@media (min-width: 721px) {
  body { padding-bottom: 0; }
  .tabbar { position: static; max-width: var(--maxw); margin: 8px auto 0; border-top: none; justify-content: flex-start; gap: 6px; padding: 0 16px; }
  .tabbar a { flex: 0 0 auto; flex-direction: row; gap: 8px; min-height: 0; padding: 9px 14px; font-size: .9rem; }
  .tabbar a .ic { width: 18px; height: 18px; }
}
@media (max-width: 560px) {
  .entry { grid-template-columns: 1fr; }
  .cat-stats { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .treemap { aspect-ratio: 3/4; min-height: 440px; }
  .db-row { grid-template-columns: 28px 1fr; }
  .db-val { grid-column: 2; white-space: normal; font-size: .9rem; margin-top: 2px; }
}
@media (max-width: 400px) { .brand-title { display: none; } }
@media (max-width: 360px) {
  .yearseg button { padding: 6px 6px; font-size: .74rem; }
  .lang button { padding: 6px 6px; }

const fnById = id => cur().tree.children.find(c => c.id === id);

// ---------- treemap (squarified) ----------
function squarify(items, x, y, w, h) {
  const total = items.reduce((s, d) => s + d.value, 0);
  if (total <= 0 || w <= 0 || h <= 0) return [];
  const scale = (w * h) / total;
  let rest = items.filter(d => d.value > 0).map(d => ({ ref: d, area: d.value * scale }));
  let rect = { x, y, w, h }; const out = [];
  const worst = (row, side) => { const sum = row.reduce((s, r) => s + r.area, 0), mx = Math.max(...row.map(r => r.area)), mn = Math.min(...row.map(r => r.area)), s2 = sum * sum; return Math.max((side * side * mx) / s2, s2 / (side * side * mn)); };
  while (rest.length) {
    const side = Math.min(rect.w, rect.h); let row = [rest[0]], i = 1;
    while (i < rest.length && worst(row, side) >= worst(row.concat(rest[i]), side)) { row.push(rest[i]); i++; }
    const ra = row.reduce((s, r) => s + r.area, 0);
    if (rect.w >= rect.h) { const cw = ra / rect.h; let yy = rect.y; for (const r of row) { const ch = r.area / cw; out.push({ ref: r.ref, x: rect.x, y: yy, w: cw, h: ch }); yy += ch; } rect = { x: rect.x + cw, y: rect.y, w: rect.w - cw, h: rect.h }; }
    else { const rh = ra / rect.w; let xx = rect.x; for (const r of row) { const cw = r.area / rh; out.push({ ref: r.ref, x: xx, y: rect.y, w: cw, h: rh }); xx += cw; } rect = { x: rect.x, y: rect.y + rh, w: rect.w, h: rect.h - rh }; }
    rest = rest.slice(row.length);
  }
  return out;
}
const MAX_CELLS = 12;
function aggregateKids(kids) {
  if (kids.length <= MAX_CELLS) return kids;
  const top = kids.slice(0, MAX_CELLS - 1), rest = kids.slice(MAX_CELLS - 1);
  return [...top, { label: { nl: `${t('other')} (${rest.length})`, fr: `${t('other')} (${rest.length})`, en: `${t('other')} (${rest.length})` }, amount: rest.reduce((s, k) => s + k.amount, 0), _other: true }];
}
const rgbHex = h => { const n = parseInt(h.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };
const relLum = ([r, g, b]) => { const s = [r, g, b].map(v => { v /= 255; return v <= .03928 ? v / 12.92 : Math.pow((v + .055) / 1.055, 2.4); }); return .2126 * s[0] + .7152 * s[1] + .0722 * s[2]; };

const pickDarkInk = rgb => { const L = relLum(rgb); return (1.05 / (L + .05)) < ((L + .05) / 0.0685); };
function cellStyle(i, count, isRoot, id) {
  if (isRoot) { const hex = FN_COLOR[id] || '#5f5f5f'; return { bg: hex, dark: LIGHT.has(id) }; }
  const f = count > 1 ? (i / (count - 1)) * 0.45 : 0; const rgb = mixWhite(rgbHex(FN_COLOR[id] || '#5f5f5f'), f);
  return { bg: `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`, dark: pickDarkInk(rgb) };
}
function renderTreemap() {
  const el = $('#treemap'); if (!el) return; el.innerHTML = '';
  const node = tmPath.length ? tmPath[tmPath.length - 1] : cur().tree;
  const isRoot = tmPath.length === 0;
  const kids = aggregateKids((node.children || []).slice().sort((a, b) => b.amount - a.amount));
  const rect = el.getBoundingClientRect(); const W = Math.max(rect.width, 280), H = Math.max(rect.height, 320);
  const cells = squarify(kids.map(k => ({ value: k.amount, node: k })), 0, 0, W, H);
  const topId = isRoot ? null : tmPath[0].id;
  cells.forEach((c, i) => {
    const k = c.ref.node;
    const drillRoot = isRoot && !k._other;            // root cell → go to category detail
    const drillDept = !isRoot && !!(k.children && k.children.length); // (none at dept level)
    const { bg, dark } = cellStyle(i, cells.length, isRoot, isRoot ? k.id : topId);
    const interactive = drillRoot || drillDept;
    const div = document.createElement(interactive ? 'button' : 'div');
    div.className = 'tm-cell' + (dark ? ' ink-dark' : '') + (interactive ? '' : ' is-leaf');
    div.style.cssText = `left:${c.x}px;top:${c.y}px;width:${c.w}px;height:${c.h}px;background:${bg}`;
    if (c.w > 54 && c.h > 30) {
      const showIc = isRoot && !k._other && c.w > 78 && c.h > 70;
      div.innerHTML = `${showIc ? `<span class="tm-ic">${fnIcon(k.id)}</span>` : ''}<span class="tm-name">${esc(labelOf(k))}</span><span class="tm-val">${fmtBig(k.amount)}</span>`;
    }
    div.title = `${labelOf(k)} — ${fmtBig(k.amount)} (${pct(k.amount, node.amount)})`;
    if (drillRoot) { div.setAttribute('aria-label', `${labelOf(k)}, ${fmtBig(k.amount)}`); div.onclick = () => navigate(`#/category/${k.id}`); }
    el.appendChild(div);

  if (tbl) { const tot = node.amount; tbl.innerHTML = `<table><thead><tr><th>${t('th_function')}</th><th class="num">${t('th_amount')}</th><th class="num">${t('th_share')}</th></tr></thead><tbody>${(node.children || []).slice().sort((a, b) => b.amount - a.amount).map(k => `<tr><td>${esc(labelOf(k))}</td><td class="num">${fmtBig(k.amount)}</td><td class="num">${pct(k.amount, tot)}</td></tr>`).join('')}</tbody></table>`; }
}

// ---------- count-up ----------
function countUp(el, to) {
  if (reduce) { el.textContent = fmtBig(to); return; }
  const dur = 900, t0 = performance.now();
  const step = now => { const p = Math.min(1, (now - t0) / dur); el.textContent = fmtBig(to * (1 - Math.pow(1 - p, 3))); if (p < 1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

    <p class="provbanner" role="note">${t('compare_caveat')}</p>
    <div class="card cmp-total"><span>${t('compare_total')}</span><b>${fmtBig(ta)} → ${fmtBig(tb)}</b><span class="cmp-delta ${dCls(td)}">${deltaStr(td, tp)}</span></div>
    <div class="cmp-list">${rows.map(r => `<a class="cmp-row" href="#/category/${r.id}">${fnChip(r.id, 'db-ic')}<span class="cmp-name"><b>${esc(r.name)}</b><small>${fmtBig(r.av)} → ${fmtBig(r.bv)}</small></span><span class="cmp-delta ${dCls(r.d)}">${deltaStr(r.d, r.p)}</span></a>`).join('')}</div>
  </section>`;
}
function mountCompare() {
  // update in place + keep keyboard focus on the chosen button (no route re-announce)
  const wire = (sel, assign) => $(sel)?.querySelectorAll('button').forEach(btn => btn.onclick = () => {
    assign(+btn.dataset.y); $('#view').innerHTML = viewCompare(); mountCompare();
    $(`${sel} button[data-y="${btn.dataset.y}"]`)?.focus();
  });
  wire('#cmpA', v => { cmpA = v; store.set('cmpA', v); });
  wire('#cmpB', v => { cmpB = v; store.set('cmpB', v); });
}

// ---------- mounts (post-insert wiring) ----------
function mountBudget() {
  tmPath = []; renderBreadcrumb(); renderTreemap(); renderTable();
  $('#dl-json')?.addEventListener('click', () => download(`federal-${year}.json`, JSON.stringify(cur(), null, 2), 'application/json'));
  $('#dl-csv')?.addEventListener('click', () => {
    const tot = cur().tree.amount;
    const csv = ['function_id,label_en,amount_eur,share_pct', ...cur().tree.children.map(f => `${f.id},${csvCell(f.label.en)},${f.amount},${(f.amount / tot * 100).toFixed(2)}`)].join('\n');
    download(`federal-${year}.csv`, csv, 'text/csv');
  });
  document.querySelectorAll('#data-table th').forEach(th => th.querySelector('button').addEventListener('click', () => { const k = th.dataset.sort; if (k === sortKey) sortDir *= -1; else { sortKey = k; sortDir = k === 'label' ? 1 : -1; } renderTable(); }));
  let raf; const ro = new ResizeObserver(() => { cancelAnimationFrame(raf); raf = requestAnimationFrame(renderTreemap); }); ro.observe($('#treemap'));
}
function renderBreadcrumb() {
  const bc = $('#breadcrumb'); if (!bc) return; bc.innerHTML = '';
  const mk = (txt, fn) => { const b = document.createElement('button'); b.type = 'button'; b.textContent = txt; b.onclick = fn; return b; };
  bc.appendChild(mk(t('back_all'), () => { tmPath = []; renderBreadcrumb(); renderTreemap(); }));
  tmPath.forEach((n, i) => { const s = document.createElement('span'); s.className = 'sep'; s.textContent = '›'; bc.appendChild(s); const last = i === tmPath.length - 1; if (last) { const c = document.createElement('span'); c.className = 'cur'; c.textContent = labelOf(n); bc.appendChild(c); } else bc.appendChild(mk(labelOf(n), () => { tmPath = tmPath.slice(0, i + 1); renderBreadcrumb(); renderTreemap(); })); });
}
function renderTable() {
  const tb = $('#data-table tbody'); if (!tb) return; const tot = cur().tree.amount;
  const rows = cur().tree.children.map(fn => ({ id: fn.id, label: labelOf(fn), amount: fn.amount, share: fn.amount / tot }));
  rows.sort((a, b) => sortKey === 'label' ? a.label.localeCompare(b.label, LOCALE[lang]) * sortDir : (a[sortKey] - b[sortKey]) * sortDir);
  tb.innerHTML = rows.map(r => `<tr><td><a class="td-lbl" href="#/category/${r.id}">${fnChip(r.id, 'cell-ic')}${esc(r.label)}</a></td><td class="num">${fmtBig(r.amount)}</td><td class="num">${pct(r.amount, tot)}</td></tr>`).join('');
  document.querySelectorAll('#data-table th').forEach(th => th.setAttribute('aria-sort', th.dataset.sort === sortKey ? (sortDir < 0 ? 'descending' : 'ascending') : 'none'));
}
function mountYou() {
  const inp = $('#income');
  inp.addEventListener('input', () => { income = +inp.value; store.set('income', income); $('#income-out').textContent = fmtCur(income); renderBreakdown(); });
  document.querySelectorAll('.extra-qty').forEach(q => q.addEventListener('input', () => {
    extras[q.dataset.ex].qty = Math.max(0, +q.value || 0); store.set('extras', extras);
    document.querySelector(`.extra-out[data-out="${q.dataset.ex}"]`).textContent = qtyOut(q.dataset.ex); renderBreakdown();
  }));
  document.querySelectorAll('input[type=checkbox][data-ex]').forEach(c => c.addEventListener('change', () => {
    const k = c.dataset.ex; extras[k].on = c.checked; store.set('extras', extras);
    const ctrl = document.querySelector(`.extra-qty[data-ex="${k}"]`); if (ctrl) ctrl.disabled = !c.checked;
    document.querySelector(`.extra-out[data-out="${k}"]`).textContent = qtyOut(k);
    renderBreakdown();
  }));
  document.querySelectorAll('.info-btn').forEach(b => b.addEventListener('click', () => {
    const p = document.getElementById('exinfo-' + b.dataset.info), open = p.hasAttribute('hidden');
    p.toggleAttribute('hidden', !open); b.setAttribute('aria-expanded', String(open));
  }));
  const cm = $('#commune'); if (cm) cm.addEventListener('input', () => { commune = cm.value.trim(); store.set('commune', commune); renderByLevel(); });
  renderBreakdown();
}
function renderBreakdown() {
  const tot = cur().tree.amount, inc = estimateTax(income), ex = extrasTotal(), tax = inc + ex;
  const yEl = $('#you-year'); if (yEl) yEl.textContent = fmtCur(tax);
  const dEl = $('#you-day'); if (dEl) dEl.textContent = fmtCur(tax / 365, 2);
  $('#db-tax').innerHTML = `${t('total_contribution')}: <strong>${fmtCur(tax)}</strong> <small>(${t('of_which_income')} ${fmtCur(inc)} + ${t('of_which_indirect')} ${fmtCur(ex)})</small> — ${t('your_split')}`;
  const box = $('#db-breakdown'); box.innerHTML = '';
  cur().tree.children.slice().sort((a, b) => b.amount - a.amount).forEach(fn => {
    const share = fn.amount / tot, yr = tax * share;
    const row = document.createElement('a'); row.className = 'db-row'; row.href = `#/category/${fn.id}`; row.setAttribute('role', 'listitem');
    row.innerHTML = `${fnChip(fn.id, 'db-ic')}<span class="db-name"><b>${esc(labelOf(fn))}</b><span class="db-bar"><i style="width:${(share * 100).toFixed(1)}%;background:${FN_COLOR[fn.id]}"></i></span></span><span class="db-val">${fmtCur(yr)} <small>${t('per_year')}</small> · ${fmtCur(yr / 365, 2)} <small>${t('per_day')}</small></span>`;
    box.appendChild(row);
  });
  renderByLevel();
}
function byLevel() {
  const inc = estimateTax(income), ex = extrasTotal();
  const pctC = (commune && COMMUNES[commune]) || 0;
  const communal = inc * pctC / 100, regional = inc * AUTONOMY_FACTOR, federal = inc * (1 - AUTONOMY_FACTOR) + ex;
  return { federal, regional, communal, total: federal + regional + communal };
}
function renderByLevel() {
  const el = $('#bylevel'); if (!el) return;
  const L = byLevel(), tot = L.total || 1;
  const seg = [['lvl_federal', L.federal, '#c8102e'], ['lvl_regional', L.regional, '#1d3461'], ['lvl_communal', L.communal, '#007068']];
  const notfound = commune && !(commune in COMMUNES) ? `<p class="provbanner" role="note">${t('commune_notfound')}</p>` : '';
  el.innerHTML = `${notfound}<div class="lvlbar" role="img" aria-label="${seg.map(([k, v]) => `${t(k)} ${pct(v, tot)}`).join(', ')}">${seg.map(([k, v, c]) => `<span style="width:${(v / tot * 100).toFixed(1)}%;background:${c}"></span>`).join('')}</div>
    <ul class="lvl-legend">${seg.map(([k, v, c]) => `<li><span class="sw" style="background:${c}"></span>${t(k)}<b>${fmtCur(v)}</b><small>${pct(v, tot)}</small></li>`).join('')}</ul>
    <p class="db-disclaimer">${t('communities_note')}</p>`;
}
function mountHome() {
  countUp($('#home-big'), cur().tree.amount);
  $('#hook').addEventListener('submit', e => { e.preventDefault(); income = Math.max(0, +$('#hook-inc').value || 0); store.set('income', income); navigate('#/you'); });
}

// ---------- downloads ----------
function download(name, text, type) { const url = URL.createObjectURL(new Blob([text], { type })); const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
const csvCell = s => '"' + String(s).replace(/"/g, '""') + '"';

// ---------- router ----------
const ROUTES = { '': { fn: viewHome, mount: mountHome, key: 'nav_home' }, budget: { fn: viewBudget, mount: mountBudget, key: 'nav_budget' }, category: { fn: viewCategory, mount: () => {}, key: 'nav_budget' }, levels: { fn: viewLevels, mount: () => {}, key: 'nav_home' }, level: { fn: viewLevel, mount: () => {}, key: 'nav_home' }, compare: { fn: viewCompare, mount: mountCompare, key: 'nav_compare' }, you: { fn: viewYou, mount: mountYou, key: 'nav_you' }, about: { fn: viewAbout, mount: () => {}, key: 'nav_about' }, sources: { fn: viewSources, mount: () => {}, key: 'nav_about' } };
function parseHash() { const h = location.hash.replace(/^#\/?/, '').split('/'); return { view: h[0] || '', id: h[1] || '' }; }
function navigate(hash) { if (location.hash === hash) render(); else location.hash = hash; }
function render() {
  const run = () => {
    const { view, id } = parseHash(); const r = ROUTES[view] || ROUTES[''];
    const el = $('#view'); el.innerHTML = r.fn(id); r.mount(id);
    const h1 = el.querySelector('h1');
    document.title = (h1 ? h1.textContent + ' — ' : '') + t('title');
    document.querySelectorAll('#tabbar a').forEach(a => a.setAttribute('aria-current', a.dataset.key === r.key ? 'page' : 'false'));
    (h1 || el).setAttribute('tabindex', '-1'); (h1 || el).focus({ preventScroll: false });
    $('#route-status').textContent = (h1?.textContent || '') + ' — ' + t('title');
    window.scrollTo(0, 0);
  };
  if (document.startViewTransition && !reduce) document.startViewTransition(run); else run();
}

// ---------- chrome ----------
function renderChrome() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('.lang button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.lang === lang)));
  // year segmented control
  $('#yearseg').innerHTML = YEARS.map(y => `<button type="button" data-year="${y}" aria-pressed="${y === year}">${y}${DATA[y]?.provisional ? `<span class="seg-badge" title="${t('provisional_badge')}">*</span>` : ''}</button>`).join('');
  $('#yearseg').querySelectorAll('button').forEach(b => b.onclick = () => { year = +b.dataset.year; store.set('year', year); tmPath = []; renderChrome(); render(); });
  // tabbar
  $('#tabbar').innerHTML = [['', 'nav_home', 'house'], ['budget', 'nav_budget', 'layout-grid'], ['compare', 'nav_compare', 'arrow-left-right'], ['you', 'nav_you', 'hand-coins'], ['about', 'nav_about', 'info']]
    .map(([v, k, ic]) => `<a href="#/${v}" data-key="${k}">${iconSvg(ICONS[ic] ? ic : 'info')}<span>${t(k)}</span></a>`).join('');
}

// ---------- boot ----------
async function loadAll() {
  if (globalThis.__DATA__) return globalThis.__DATA__;
  const out = {}; await Promise.all(YEARS.map(async y => { out[y] = await (await fetch(`data/federal-${y}.json`)).json(); }));
  return out;
}
async function boot() {
  try { DATA = await loadAll(); if (!DATA[year]?.tree) year = 2024; if (!DATA[year]?.tree) throw 0; }
  catch { document.querySelector('#view').innerHTML = `<p role="alert" class="card" style="border-color:var(--be-red)">⚠️ ${t('cv_year') || 'Data could not be loaded.'}</p>`; return; }
  try { COMMUNES = globalThis.__COMMUNES__ || await (await fetch('data/communal-pit.json')).json(); } catch { COMMUNES = {}; }
  document.querySelectorAll('.lang button').forEach(b => b.addEventListener('click', () => { lang = b.dataset.lang; store.set('lang', lang); renderChrome(); render(); }));
  $('#brand-home').addEventListener('click', () => navigate('#/'));
  window.addEventListener('hashchange', render);
  renderChrome();
  render();
}
boot();
</script>
